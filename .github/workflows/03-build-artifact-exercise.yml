# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: 03 Build Artifact Exercise Workflow

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image

jobs:
  build-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Run tests
        # Build only after the verification step passes.
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # Enables cross-platform builds (e.g. linux/arm64) on the runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # Activates the Buildx builder which powers docker/build-push-action.
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image
        # Buildx builds the image and writes it directly to a tar file.
        # load: false + outputs:type=docker keeps it local, no registry needed.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}

      - name: Upload build artifact
        # Store the tar so a later workflow can pull the exact same image.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}
          retention-days: 7
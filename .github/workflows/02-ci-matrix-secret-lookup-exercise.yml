name: 02 CI Matrix Secret Lookup

on:
  workflow_dispatch:

jobs:
  # ─── ONE JOB, MATRIX ALREADY KNOWN IN YAML ───────────────────
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: py311
            version_secret: PYTHON_VERSION_311   # ← secret name stored in matrix
          - label: py312
            version_secret: PYTHON_VERSION_312   # ← secret name stored in matrix

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve Python version from secret
        id: resolve-version
        run: |
          echo "python_version=${{ secrets[matrix.version_secret] }}" >> "$GITHUB_OUTPUT"
        # secrets[matrix.version_secret] dynamically picks the right secret
        # for py311 → reads PYTHON_VERSION_311
        # for py312 → reads PYTHON_VERSION_312

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ steps.resolve-version.outputs.python_version }}

      - name: Verify Python version
        run: python --version

      - name: Run tests
        run: python -m unittest discover -s tests -v
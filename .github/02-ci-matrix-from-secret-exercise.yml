name: 02 CI Matrix From Secret

on:
  workflow_dispatch:

jobs:
  # ─── JOB 1: READ SECRET AND PUBLISH OUTPUT ───────────────────
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.read-secret.outputs.python_versions }}

    steps:
      - name: Read secret and publish as output
        id: read-secret
        run: |
          echo "python_versions=${{ secrets.PYTHON_VERSIONS }}" >> "$GITHUB_OUTPUT"
        # Secret value must be a JSON array string, example:
        # PYTHON_VERSIONS = ["3.11","3.12"]

  # ─── JOB 2: FAN OUT INTO MATRIX ──────────────────────────────
  run-tests:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.prepare-matrix.outputs.python-versions) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python version
        run: python --version

      - name: Run tests
        run: python -m unittest discover -s tests -v